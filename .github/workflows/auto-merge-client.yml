name: Auto Merge Client Changes

# Dispara quando o cliente faz push no branch "dev"
on:
  push:
    branches:
      - dev

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AGENCY_PAT }}

      - name: Configure Git as Agency
        run: |
          git config user.name "studioc-agency"
          git config user.email "studioc-agency@users.noreply.github.com"

      - name: Merge dev into main
        run: |
          git checkout main
          git merge origin/dev --no-ff -m "Auto-merge: client changes from dev branch"
          git push origin main
